    <main id="contact">

      <section class="contact">
        <div class="container">
          <h2 class="page-title"><span>/</span> contact</h2>

          <div class="flex">
            <div class="left">
              <p class="text">お仕事のご依頼やご相談、どうぞお気軽にお問い合わせください。<br>各種SNSからも、制作のご相談やメッセージを承っております。</p>
              <ul class="sns">
                <li>
                  <a href="#">
                    <img src="img/instagram.svg" alt="snsアイコン">
                    <p>Instagram</p>
                  </a>
                </li>
                <li>
                  <a href="#">
                    <img src="img/x-twitter.svg" alt="snsアイコン">
                    <p>X(旧Twitter)</p>
                  </a>
                </li>
              </ul>
              <div class="maru-border-m"></div>
              <div class="maru-stripe"></div>
            </div>
            <form action="#" class="form">

              <div class="form-item">
                <label for="name">お名前 <span>※</span></label>
                <div class="input-area">
                  <input id="name" class="input" type="text" name="name" required />
                </div>
              </div>

              <div class="form-item">
                <label for="email">メールアドレス <span>※</span></label>
                <div class="input-area">
                  <input id="email" class="input" type="email" name="email" required />
                </div>
              </div>

              <div class="form-item">
                <label for="message">ご相談内容 <span>※</span></label>
                <div class="input-area">
                  <textarea
                    class="message"
                    name="message"
                    id="message"
                    required></textarea>
                </div>
              </div>

              <div class="form-submit">
                <button type="submit" class="btn">送信</button>
              </div>

            </form>
          </div>

        </div>
      </section>
